<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>블로그 게시판</title>
</head>
<body>
<h1>게시글 목록</h1>
<!--
/posts/new 로 연결되어 있는 html 을 화면에 보여줄 것

/posts/new 로 이동
→ HtmlController 글쓰기폼() 기능 실행
→ new.html 에 작성되어 있는 코딩을 화면에 표시

button 태그
- type="submit"
    <button> 태그에 타입을 지정하지 않았을 때 자동으로 세팅되는 기본 타입
    form 내부에 작성한 데이터를 제출하는 기능
    예전에는 많이 사용되었지만 현재는 사용을 자제하는 트렌드
- type="button"
    개발자들이 가장 많이 사용하는 태그
    submit 에 지정되어 있는 제약 없이 개발자가 원하는 제약과 흐름을 설정하며
    코딩할 때 주로 사용
    button 태그를 제출 태그가 아닌 단순 버튼 클릭용 태그로 전환 후,
    id 나 on이벤트를 이용해서 개발자가 원하는 기능을 세팅
    <a href="/posts/new">
        <button type="button">새 글쓰기</button>
    </a>
    제출하는 버튼이 아니라 a 태그에 설정한 경로로 이동하는 버튼 세팅
- type="reset"
    어느정도 많이 사용하는 버튼 태그
    form 내부에 작성한 데이터를 모두 지워주는 기능을 보유

-->
<a href="/posts/new">
    <button type="button">새 글쓰기</button>
</a>
<br><br>
<table border="1" cellpadding="10">
    <thead>
    <tr>
        <th>번호</th>
        <th>제목</th>
        <th>내용</th>
        <th>수정</th>
        <th>삭제</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${posts}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.title}"></td>
        <td th:text="${p.content}"></td>
        <td>
            <!-- 중간에 #{p.id} 를 추가하여
            수정하기 버튼을 클릭하면
            수정하기 폼이 보이도록 코드 수정-->
            <!--  /posts/{id}/edit-->
            <a th:href="@{'/posts/'+${p.id}+'/edit'}">
                <button type="button">수정하기</button>
            </a>
        </td>
        <td>
            <!-- 중간에 #{p.id} 를 추가하여
            수정하기 버튼을 클릭하면
            수정하기 폼이 보이도록 코드 수정-->
            <a th:href="@{'/posts/'+${p.id}+'/delete'}">
                <button type="button">삭제하기</button>
            </a>
        </td>
    </tr>
    </tbody>
</table>
<script>

</script>
</body>
</html>
